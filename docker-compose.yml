services:
  boardoil:
    image: ghcr.io/dozigden/boardoil:latest
    container_name: boardoil
    ports:
      - "5000:5000"
    environment:
      BoardOilAuth__SigningKey: "replace-this-with-a-strong-32-char-min-signing-key"
      BoardOilAuth__AllowInsecureCookies: "true"
    volumes:
      - boardoil-data:/data
    restart: unless-stopped

volumes:
  boardoil-data:
