services:
  boardoil:
    build:
      context: .
      dockerfile: Dockerfile
    image: boardoil:dev
    container_name: boardoil
    ports:
      - "5000:5000"
    environment:
      BoardOilAuth__AllowInsecureCookies: "true"
    volumes:
      - boardoil-data:/data
    restart: unless-stopped

volumes:
  boardoil-data:
