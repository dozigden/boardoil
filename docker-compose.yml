services:
  boardoil:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: boardoil:dev
    container_name: boardoil
    ports:
      - "5000:5000"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5000"
      BoardOilAuth__AllowInsecureCookies: "true"
    volumes:
      - boardoil-data:/data
    networks:
      boardoil-internal:
        ipv4_address: 172.31.0.2
    restart: unless-stopped

volumes:
  boardoil-data:

networks:
  boardoil-internal:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24
