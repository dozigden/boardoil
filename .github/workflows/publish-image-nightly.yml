name: Publish Nightly Docker Image

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: "Force a nightly publish even if no commits changed since last nightly"
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  packages: write

concurrency:
  group: publish-image-nightly
  cancel-in-progress: false

jobs:
  publish:
    name: Build and Publish Nightly to GHCR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute image name
        id: image
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Resolve app version
        id: app_version
        run: |
          VERSION="$(grep -oPm1 '(?<=<Version>)[^<]+' Directory.Build.props || true)"
          if [ -z "$VERSION" ]; then
            echo "Failed to resolve <Version> from Directory.Build.props"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Detect changes since last nightly build
        id: changes
        run: |
          CURRENT_SHA="$(git rev-parse HEAD)"
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          LAST_SHA="$(git rev-list -n 1 refs/tags/nightly-last-build 2>/dev/null || true)"
          FORCE_REBUILD="${{ github.event.inputs.force_rebuild || 'false' }}"

          echo "current_sha=${CURRENT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

          if [ "$FORCE_REBUILD" = "true" ]; then
            echo "Manual force rebuild requested. Publishing nightly image for ${CURRENT_SHA}."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$LAST_SHA" ] && [ "$LAST_SHA" = "$CURRENT_SHA" ]; then
            echo "No changes since last nightly build (${CURRENT_SHA}). Skipping publish."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            if [ -z "$LAST_SHA" ]; then
              echo "No previous nightly marker found. Publishing nightly image."
            else
              echo "Detected changes since last nightly build (${LAST_SHA} -> ${CURRENT_SHA})."
            fi
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to GHCR
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        if: steps.changes.outputs.should_build == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=nightly
            type=raw,value=nightly-${{ steps.changes.outputs.short_sha }}

      - name: Build and push image
        if: steps.changes.outputs.should_build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BO_VERSION=${{ steps.app_version.outputs.version }}
            BO_CHANNEL=nightly
            BO_BUILD=nightly-${{ steps.changes.outputs.short_sha }}
            BO_COMMIT=${{ steps.changes.outputs.current_sha }}

      - name: Update nightly build marker tag
        if: steps.changes.outputs.should_build == 'true'
        run: |
          git tag -f nightly-last-build "${{ steps.changes.outputs.current_sha }}"
          git push origin refs/tags/nightly-last-build --force
