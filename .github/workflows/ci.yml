name: CI

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (.NET)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          cache: true
          cache-dependency-path: |
            **/packages.lock.json

      - name: Restore
        run: dotnet restore BoardOil.slnx --locked-mode -maxcpucount:1 -nodeReuse:false

      - name: Build
        run: dotnet build BoardOil.slnx --configuration Release --no-restore -maxcpucount:1 -nodeReuse:false

      - name: Test API
        run: dotnet test BoardOil.Api.Tests/BoardOil.Api.Tests.csproj --configuration Release --no-build -maxcpucount:1 -nodeReuse:false --logger "trx;LogFileName=BoardOil.Api.Tests.trx" --results-directory TestResults

      - name: Test Services
        if: always()
        run: dotnet test BoardOil.Services.Tests/BoardOil.Services.Tests.csproj --configuration Release --no-build -maxcpucount:1 -nodeReuse:false --logger "trx;LogFileName=BoardOil.Services.Tests.trx" --results-directory TestResults

      - name: Publish .NET test report
        if: always()
        uses: dorny/test-reporter@v2
        with:
          name: .NET Tests
          path: TestResults/*.trx
          reporter: dotnet-trx

  frontend:
    name: Frontend (Vue)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: BoardOil.Web

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: BoardOil.Web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: npm run check

      - name: Run tests
        run: npm test
